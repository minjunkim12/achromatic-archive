<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Achromatic.</title>
<meta name="description" content="디자인, 기술, 일하는 방식에 대한 짧고 명확한 글.">
<link rel="stylesheet" href="colors_and_type.css">
<style>
/* ============================================================
 * Achromatic · Blog Home v2
 * Toss-feed layout · responsive · dark mode
 * ============================================================ */

/* --- Dark mode token layer --------------------------------- */
:root { --nav-bg: rgba(255,255,255,.90); }

@media (prefers-color-scheme: dark) {
  :root {
    --ac-bg-page:      #07101e;
    --ac-bg-canvas:    #0c1525;
    --ac-bg-elev:      #111f33;
    --ac-bg-tint:      #132040;
    --ac-border:       #1a2d47;
    --ac-border-soft:  #111e32;
    --ac-fg-title:     #e2e8f0;
    --ac-fg-body:      #94a3b8;
    --ac-fg-meta:      #3d5472;
    --ac-fg-mute:      #263d5a;
    --ac-primary-tint: #08193e;
    --ac-primary-soft: #0d2255;
    --ac-slate-100:    #111f33;
    --ac-shadow-card:  0 2px 12px rgba(0,0,0,.30);
    --ac-shadow-pop:   0 8px 28px rgba(0,0,0,.50);
    --nav-bg: rgba(7,16,30,.92);
  }
}

/* --- Reset ------------------------------------------------- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
body {
  font-family: var(--ac-font-sans);
  background: var(--ac-bg-page);
  color: var(--ac-fg-body);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}
a { color: inherit; text-decoration: none; }
::selection { background: var(--ac-primary-tint); color: var(--ac-primary); }

/* --- Nav --------------------------------------------------- */
.nav {
  position: sticky; top: 0; z-index: 50;
  background: var(--nav-bg);
  backdrop-filter: saturate(180%) blur(16px);
  -webkit-backdrop-filter: saturate(180%) blur(16px);
  border-bottom: 1px solid var(--ac-border-soft);
}
.nav-inner {
  max-width: 1100px; margin: 0 auto;
  padding: 0 24px; height: 60px;
  display: flex; align-items: center; justify-content: space-between;
}
.brand {
  font-size: 17px; font-weight: 800; letter-spacing: -0.03em;
  color: var(--ac-fg-title); flex-shrink: 0;
}
.brand .dot { color: var(--ac-primary); }

/* Desktop nav links */
.nav-links {
  display: none;
  align-items: center; gap: 2px;
}
@media (min-width: 768px) { .nav-links { display: flex; } }

.nav-link {
  font-size: 14px; font-weight: 600; color: var(--ac-fg-meta);
  padding: 7px 14px; border-radius: var(--ac-r-sm);
  transition: background var(--ac-d-micro), color var(--ac-d-micro);
}
.nav-link:hover { background: var(--ac-slate-100); color: var(--ac-fg-title); }

.nav-cta {
  margin-left: 6px;
  font-size: 14px; font-weight: 700; color: #fff;
  background: var(--ac-primary); padding: 9px 18px;
  border-radius: var(--ac-r-pill);
  transition: background var(--ac-d-micro);
}
.nav-cta:hover { background: var(--ac-primary-hover); }

/* Icon buttons (search + hamburger) */
.nav-icons { display: flex; align-items: center; gap: 2px; }
.nav-right  { display: flex; align-items: center; gap: 4px; }
.nav-icon {
  width: 38px; height: 38px; border-radius: var(--ac-r-sm);
  display: grid; place-items: center;
  color: var(--ac-fg-meta);
  transition: background var(--ac-d-micro), color var(--ac-d-micro);
}
.nav-icon:hover { background: var(--ac-slate-100); color: var(--ac-fg-title); }
.nav-hamburger { display: grid; }
@media (min-width: 768px) { .nav-hamburger { display: none; } }

/* --- Page wrapper ------------------------------------------ */
.page-wrap {
  max-width: 1100px; margin: 0 auto;
  padding: 0 24px; width: 100%;
}

/* ============================================================
 * HERO (Featured post carousel)
 * Mobile: image top → text bottom
 * Desktop: text left (45%) → image right (55%)
 * ============================================================ */
.hero-section {
  padding: 40px 0 52px;
  border-bottom: 1px solid var(--ac-border-soft);
  min-height: 200px;
}

/* Grid: single col mobile, two col desktop */
.hero-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
  align-items: center;
}
@media (min-width: 768px) {
  .hero-grid {
    grid-template-columns: 5fr 7fr;
    gap: 56px;
  }
}

/* On mobile: image comes first (order -1 reversal) */
.hero-img-col { order: -1; }
@media (min-width: 768px) { .hero-img-col { order: 0; } }

/* Hero image wrapper — clips the zoom */
.hero-img-wrap {
  border-radius: var(--ac-r-xl);
  overflow: hidden;
  aspect-ratio: 16 / 10;
  display: block;
  cursor: pointer;
}

/* Colored cover (the image placeholder) */
.hero-cover {
  width: 100%; height: 100%;
  position: relative;
  background: var(--ac-primary);
  display: flex; align-items: center; justify-content: center;
  transition: transform 440ms cubic-bezier(.2,0,0,1);
}
.hero-img-wrap:hover .hero-cover { transform: scale(1.04); }

.hero-cover svg {
  position: absolute; inset: 0; width: 100%; height: 100%;
}

/* Hero text column */
.hero-tag {
  display: inline-flex; align-items: center;
  height: 22px; padding: 0 9px; border-radius: var(--ac-r-pill);
  font-size: 11px; font-weight: 700; letter-spacing: .025em;
  background: var(--ac-primary-tint); color: var(--ac-primary);
  margin-bottom: 16px;
}

.hero-title {
  font-size: clamp(24px, 3.4vw, 38px);
  font-weight: 800;
  letter-spacing: -0.03em;
  line-height: 1.2;
  color: var(--ac-fg-title);
  margin-bottom: 14px;
  text-wrap: balance;
  /* hero title stays its color on hover — no blue transition here */
}

.hero-desc {
  font-size: 15px; font-weight: 400;
  line-height: 1.72; color: var(--ac-fg-meta);
  margin-bottom: 28px;
}

.hero-nav {
  display: flex; align-items: center; gap: 8px;
}
.arrow-btn {
  width: 44px; height: 44px; border-radius: 50%;
  border: 1px solid var(--ac-border);
  background: var(--ac-bg-elev);
  display: grid; place-items: center;
  cursor: pointer;
  color: var(--ac-fg-title);
  transition: background var(--ac-d-micro), box-shadow var(--ac-d-micro), transform var(--ac-d-micro);
}
.arrow-btn:hover { background: var(--ac-slate-100); box-shadow: var(--ac-shadow-sm); }
.arrow-btn:active { transform: scale(.94); }
.hero-count {
  font-size: 13px; font-weight: 600; color: var(--ac-fg-mute);
  font-variant-numeric: tabular-nums; margin-left: 6px;
}

/* ============================================================
 * ARTICLES + SIDEBAR
 * ============================================================ */
.body-section { padding: 44px 0 96px; }

.body-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 0;
  align-items: start;
}
@media (min-width: 768px) {
  .body-grid {
    grid-template-columns: 1fr 268px;
    gap: 64px;
  }
}

.section-title {
  font-size: 20px; font-weight: 800;
  letter-spacing: -0.025em; color: var(--ac-fg-title);
  margin-bottom: 4px;
}

/* --- Article card ------------------------------------------ */
.article-card {
  display: flex; align-items: flex-start;
  gap: 20px; padding: 26px 0;
  border-bottom: 1px solid var(--ac-border-soft);
  cursor: pointer;
  opacity: 0;
  animation: fadeUp 320ms cubic-bezier(.2,0,0,1) forwards;
}
.article-card:last-child { border-bottom: none; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.article-body { flex: 1; min-width: 0; }

.article-meta {
  display: flex; align-items: center; gap: 8px;
  flex-wrap: wrap; margin-bottom: 8px;
}

/* Tag badges */
.a-tag {
  display: inline-flex; align-items: center;
  height: 22px; padding: 0 9px; border-radius: var(--ac-r-pill);
  font-size: 11px; font-weight: 700; letter-spacing: .02em; flex-shrink: 0;
}
.tag-blue  { background: var(--ac-primary-tint); color: var(--ac-primary); }
.tag-slate { background: var(--ac-slate-100); color: var(--ac-fg-meta); }
.tag-green { background: #e4f7ef; color: #0f7d53; }
.tag-amber { background: #fff3e0; color: #b56e00; }
@media (prefers-color-scheme: dark) {
  .tag-green { background: #09281c; color: var(--ac-success); }
  .tag-amber { background: #281c00; color: var(--ac-warning); }
}

.a-author {
  font-size: 13px; font-weight: 600; color: var(--ac-fg-meta);
}

/* Article title — turns blue on hover (articles only) */
.article-title {
  font-size: 17px; font-weight: 700;
  letter-spacing: -0.02em; line-height: 1.4;
  color: var(--ac-fg-title);
  margin-bottom: 6px;
  text-wrap: balance;
  transition: color var(--ac-d-micro) var(--ac-ease);
}
.article-card:hover .article-title { color: var(--ac-primary); }

.article-desc {
  font-size: 14px; font-weight: 400;
  line-height: 1.68; color: var(--ac-fg-meta);
  display: -webkit-box;
  -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}

.article-date {
  margin-top: 8px;
  font-size: 12px; color: var(--ac-fg-mute);
  font-variant-numeric: tabular-nums; letter-spacing: .01em;
}

/* Desktop thumbnail — right side */
.article-thumb {
  width: 130px; height: 90px; flex-shrink: 0;
  border-radius: var(--ac-r-md); overflow: hidden;
  display: none;
}
@media (min-width: 500px) { .article-thumb { display: block; } }

/* Mobile full-width cover — bottom of card */
.article-cover-mob {
  display: block;
  height: 120px; margin-top: 16px;
  border-radius: var(--ac-r-md); overflow: hidden;
}
@media (min-width: 500px) { .article-cover-mob { display: none; } }

/* The colored cover block (shared between thumb + mobile cover) */
.cover-fill {
  width: 100%; height: 100%;
  background: var(--cover-bg, var(--ac-primary));
  transition: transform 440ms cubic-bezier(.2,0,0,1);
}
/* Image zoom on hover — applies to both thumb and mobile cover */
.article-card:hover .cover-fill { transform: scale(1.10); }

/* --- Sidebar -------------------------------------------- */
.sidebar { display: none; }
@media (min-width: 768px) {
  .sidebar {
    display: block;
    position: sticky; top: 80px;
    padding-top: 60px; /* align with section title */
  }
}
.sidebar-card {
  background: var(--ac-bg-canvas);
  border-radius: var(--ac-r-xl);
  padding: 24px 22px;
}

.sidebar-title {
  font-size: 15px; font-weight: 700;
  letter-spacing: -0.015em; color: var(--ac-fg-meta);
  margin-bottom: 20px;
}

.popular-item {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 10px 0;
  cursor: pointer;
  transition: opacity var(--ac-d-micro);
}
.popular-item:hover { opacity: .6; }

.popular-num {
  width: 32px; height: 32px; flex-shrink: 0;
  background: var(--ac-bg-page);
  border-radius: 10px;
  display: grid; place-items: center;
  font-size: 14px; font-weight: 800;
  color: var(--ac-primary);
  box-shadow: 0 1px 4px rgba(15,23,42,.07);
}
.popular-title {
  font-size: 14px; font-weight: 700;
  line-height: 1.45; letter-spacing: -0.015em;
  color: var(--ac-fg-title); margin-bottom: 4px;
  text-wrap: balance;
}
.popular-author {
  font-size: 12px; color: var(--ac-fg-mute);
}

/* --- Skeleton loading -------------------------------------- */
.skel {
  border-radius: 5px;
  background: linear-gradient(
    90deg,
    var(--ac-border)      25%,
    var(--ac-border-soft) 50%,
    var(--ac-border)      75%
  );
  background-size: 200% 100%;
  animation: shimmer 1.5s ease infinite;
}
@keyframes shimmer {
  0%   { background-position:  200% 0; }
  100% { background-position: -200% 0; }
}

/* Hero skeleton */
.hero-skel-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px; align-items: center;
}
@media (min-width: 768px) {
  .hero-skel-grid { grid-template-columns: 5fr 7fr; gap: 56px; }
}
.hero-skel-img {
  aspect-ratio: 16/10; border-radius: var(--ac-r-xl);
  order: -1;
}
@media (min-width: 768px) { .hero-skel-img { order: 0; } }
.hero-skel-text { display: flex; flex-direction: column; gap: 10px; }
.sk-tag  { width: 60px; height: 22px; border-radius: 999px; }
.sk-h1   { height: 34px; border-radius: 6px; }
.sk-h1s  { height: 34px; width: 72%; border-radius: 6px; }
.sk-p    { height: 14px; border-radius: 4px; }
.sk-ps   { height: 14px; width: 80%; border-radius: 4px; }

/* Article skeleton */
.art-skel {
  display: flex; gap: 20px;
  padding: 26px 0; border-bottom: 1px solid var(--ac-border-soft);
}
.art-skel:last-child { border-bottom: none; }
.art-skel-body { flex: 1; display: flex; flex-direction: column; gap: 8px; }
.sk-atag  { width: 58px; height: 22px; border-radius: 999px; }
.sk-atitle{ height: 17px; border-radius: 4px; }
.sk-adesc { height: 13px; border-radius: 4px; }
.art-skel-thumb { width: 130px; height: 90px; border-radius: var(--ac-r-md); flex-shrink: 0; display: none; }
@media (min-width: 500px) { .art-skel-thumb { display: block; } }

/* --- Empty state ------------------------------------------- */
.empty {
  display: none;
  flex-direction: column; align-items: center; text-align: center;
  padding: 64px 0; gap: 10px;
}
.empty.show { display: flex; }
.empty-icon {
  width: 52px; height: 52px; border-radius: var(--ac-r-md);
  background: var(--ac-bg-canvas); border: 1px solid var(--ac-border);
  display: grid; place-items: center;
  margin-bottom: 8px; color: var(--ac-fg-mute);
}
.empty-title { font-size: 16px; font-weight: 700; letter-spacing: -0.015em; color: var(--ac-fg-title); }
.empty-desc  { font-size: 14px; color: var(--ac-fg-meta); line-height: 1.65; max-width: 230px; }

/* --- Footer ------------------------------------------------ */
.page-footer { border-top: 1px solid var(--ac-border-soft); margin-top: auto; }
.footer-inner {
  max-width: 1100px; margin: 0 auto;
  padding: 28px 24px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; flex-wrap: wrap;
}
.footer-brand { font-size: 14px; font-weight: 800; letter-spacing: -0.025em; color: var(--ac-fg-title); }
.footer-brand .dot { color: var(--ac-primary); }
.footer-copy { font-size: 12px; color: var(--ac-fg-mute); letter-spacing: .02em; }
</style>
</head>

<script>
var allPosts = [];
var featuredIdx = 0;

/* Helpers */
var TAG_MAP = {
  '디자인': 'tag-blue', '디자인 노트': 'tag-blue', 'Design': 'tag-blue',
  'Tech': 'tag-slate', '기술': 'tag-slate', '조직 설계': 'tag-slate',
  '에세이': 'tag-green', 'Essay': 'tag-green',
  '툴 노트': 'tag-amber', 'Tool': 'tag-amber'
};

function tagCls(t) { return TAG_MAP[t] || 'tag-slate'; }

function fmtDate(s) {
  if (!s) return '';
  var p = s.split('-');
  return p.length >= 3 ? p[0] + '.' + p[1] + '.' + p[2] : s;
}

function esc(s) {
  return String(s || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

/* Abstract SVG illustration for the hero cover */
function coverIllustration() {
  return [
    '<svg viewBox="0 0 480 320" fill="none" xmlns="http://www.w3.org/2000/svg">',
      '<rect x="96" y="58" width="175" height="204" rx="22" fill="rgba(255,255,255,.12)"/>',
      '<rect x="274" y="44" width="122" height="122" rx="20" fill="rgba(255,255,255,.16)"/>',
      '<rect x="286" y="178" width="140" height="84" rx="18" fill="rgba(255,255,255,.10)"/>',
      '<rect x="118" y="86" width="76" height="10" rx="5" fill="rgba(255,255,255,.38)"/>',
      '<rect x="118" y="106" width="52" height="10" rx="5" fill="rgba(255,255,255,.22)"/>',
      '<rect x="118" y="140" width="64" height="10" rx="5" fill="rgba(255,255,255,.28)"/>',
      '<rect x="118" y="160" width="42" height="10" rx="5" fill="rgba(255,255,255,.16)"/>',
      '<rect x="118" y="194" width="96" height="10" rx="5" fill="rgba(255,255,255,.22)"/>',
      '<rect x="118" y="214" width="68" height="10" rx="5" fill="rgba(255,255,255,.14)"/>',
      '<rect x="296" y="70" width="66" height="10" rx="5" fill="rgba(255,255,255,.38)"/>',
      '<rect x="296" y="90" width="44" height="10" rx="5" fill="rgba(255,255,255,.22)"/>',
      '<rect x="296" y="116" width="80" height="10" rx="5" fill="rgba(255,255,255,.26)"/>',
      '<rect x="296" y="136" width="56" height="10" rx="5" fill="rgba(255,255,255,.16)"/>',
      '<rect x="304" y="200" width="80" height="10" rx="5" fill="rgba(255,255,255,.32)"/>',
      '<rect x="304" y="220" width="56" height="10" rx="5" fill="rgba(255,255,255,.20)"/>',
      '<rect x="304" y="240" width="68" height="10" rx="5" fill="rgba(255,255,255,.14)"/>',
    '</svg>'
  ].join('');
}

/* Render the hero featured post */
function renderHero(post) {
  var section = document.getElementById('hero-section');
  var total   = allPosts.length;
  var bg      = esc(post.bgColor || '#0064FF');
  var tCls    = tagCls(post.tag);

  section.innerHTML = [
    '<div class="hero-grid">',
      /* Text column */
      '<div class="hero-text-col">',
        (post.tag
          ? '<div class="hero-tag ' + tCls + '">' + esc(post.tag) + '</div>'
          : ''),
        '<h2 class="hero-title">' + esc(post.title) + '</h2>',
        (post.description
          ? '<p class="hero-desc">' + esc(post.description) + '</p>'
          : ''),
        '<div class="hero-nav">',
          '<button class="arrow-btn" id="hprev" aria-label="이전 글">',
            '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>',
          '</button>',
          '<button class="arrow-btn" id="hnext" aria-label="다음 글">',
            '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>',
          '</button>',
          '<span class="hero-count">' + (featuredIdx + 1) + ' / ' + total + '</span>',
        '</div>',
      '</div>',
      /* Image column */
      '<a class="hero-img-col" href="' + esc(post.href || '#') + '" aria-label="' + esc(post.title) + ' 읽기">',
        '<div class="hero-img-wrap">',
          '<div class="hero-cover" style="background:' + bg + '">',
            coverIllustration(),
          '</div>',
        '</div>',
      '</a>',
    '</div>'
  ].join('');

  /* Arrow handlers */
  document.getElementById('hprev').onclick = function() {
    featuredIdx = (featuredIdx - 1 + allPosts.length) % allPosts.length;
    renderHero(allPosts[featuredIdx]);
  };
  document.getElementById('hnext').onclick = function() {
    featuredIdx = (featuredIdx + 1) % allPosts.length;
    renderHero(allPosts[featuredIdx]);
  };
}

/* Render article list */
function renderArticles(posts) {
  var list = document.getElementById('articles-list');
  var frag = document.createDocumentFragment();

  posts.forEach(function(post, i) {
    var a  = document.createElement('a');
    a.className = 'article-card';
    a.href = post.href || '#';
    a.style.animationDelay = (i * 50) + 'ms';

    var bg   = post.bgColor || '#0064FF';
    var tCls = tagCls(post.tag);

    a.innerHTML = [
      '<div class="article-body">',
        '<div class="article-meta">',
          (post.tag
            ? '<span class="a-tag ' + tCls + '">' + esc(post.tag) + '</span>'
            : ''),
          (post.author
            ? '<span class="a-author">' + esc(post.author) + '</span>'
            : ''),
        '</div>',
        '<div class="article-title">' + esc(post.title) + '</div>',
        (post.description
          ? '<div class="article-desc">' + esc(post.description) + '</div>'
          : ''),
        '<div class="article-date">' + fmtDate(post.date) + '</div>',
        /* Mobile full-width cover */
        '<div class="article-cover-mob">',
          '<div class="cover-fill" style="--cover-bg:' + bg + '"></div>',
        '</div>',
      '</div>',
      /* Desktop thumbnail */
      '<div class="article-thumb">',
        '<div class="cover-fill" style="--cover-bg:' + bg + '"></div>',
      '</div>'
    ].join('');

    frag.appendChild(a);
  });

  list.appendChild(frag);
}

/* Render popular sidebar */
function renderPopular(posts) {
  var el   = document.getElementById('popular-list');
  /* Reverse order = simulate "most viewed" */
  var top  = posts.slice().reverse().slice(0, 5);
  var html = '';

  top.forEach(function(p, i) {
    html += [
      '<a class="popular-item" href="' + esc(p.href || '#') + '">',
        '<span class="popular-num">' + (i + 1) + '</span>',
        '<div>',
          '<div class="popular-title">' + esc(p.title) + '</div>',
          (p.author ? '<div class="popular-author">' + esc(p.author) + '</div>' : ''),
        '</div>',
      '</a>'
    ].join('');
  });

  el.innerHTML = html;
}

/* ── Bootstrap ─────────────────────────────────────────── */
(async function init() {
  var heroLoadEl     = document.getElementById('hero-loading');
  var artLoadEl      = document.getElementById('articles-loading');
  var emptyEl        = document.getElementById('empty-state');

  var posts = [];
  try {
    var res = await fetch('posts.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    posts = await res.json();
  } catch (err) {
    console.warn('[Achromatic] posts.json fetch error:', err.message);
  }

  allPosts = Array.isArray(posts) ? posts : [];

  /* Remove skeletons */
  heroLoadEl.remove();
  artLoadEl.remove();

  if (allPosts.length === 0) {
    document.getElementById('hero-section').innerHTML = '';
    document.getElementById('sidebar').style.display = 'none';
    emptyEl.classList.add('show');
    return;
  }

  renderHero(allPosts[0]);
  renderArticles(allPosts);
  renderPopular(allPosts);
})();
</script>
