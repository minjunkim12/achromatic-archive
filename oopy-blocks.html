<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Oopy Blocks · Achromatic.</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>

/* ── TOKENS — Toss Dev Portal ──────────────────────────────── */
:root {
  --p:#3182F6; --ph:#1B64DA; --pp:#1357C7;
  --pt:#EEF3FD; --ps:#D6E4FD;
  --s50:#F9FAFB; --s100:#F2F4F6; --s200:#E5E8EB;
  --s300:#D1D6DB; --s400:#8B95A1; --s500:#6B7684;
  --s600:#4E5968; --s700:#333D4B; --s800:#191F28; --s900:#0E1624;
  --tx1:#191F28; --tx2:#333D4B; --tx3:#4E5968; --tx4:#8B95A1;
  --bg:#FFFFFF; --bgc:#F9FAFB; --bgt:#EEF3FD;
  --bd:#E5E8EB; --bds:#F2F4F6;
  --ok:#00B493; --warn:#F59E0B; --err:#F04452;
  --rXS:3px; --rS:6px; --rM:8px; --rL:12px; --rXL:16px; --rPill:999px;
  --shSm:0 1px 2px rgba(0,0,0,.04);
  --shCard:0 1px 4px rgba(0,0,0,.06);
  --shPop:0 4px 12px rgba(0,0,0,.08);
  --shDeep:0 8px 24px rgba(0,0,0,.12);
  --ring:0 0 0 3px rgba(49,130,246,.15);
  --gradB:linear-gradient(135deg,#3182F6 0%,#5BA2F7 100%);
  --gradInk:linear-gradient(180deg,#333D4B 0%,#191F28 100%);
  --gradGlow:radial-gradient(ellipse at center,rgba(49,130,246,.12) 0%,rgba(49,130,246,0) 70%);
  --ease:cubic-bezier(.2,0,0,1);
  --easeOut:cubic-bezier(.16,1,.3,1);
  --dMicro:120ms; --dBase:200ms; --dEnter:300ms;
  --font:"Pretendard Variable","Pretendard",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;
  --sidebar-w:216px;
  --rail-w:56px;
}

/* ═══ RESET ══════════════════════════════════════════════════ */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0 }
html { -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; height:100% }
body { font-family:var(--font); font-size:15px; line-height:1.5; color:var(--tx2); background:var(--bgc); height:100%; overflow:hidden }
a { color:inherit; text-decoration:none }
button { font-family:inherit; cursor:pointer; border:none; background:none }
img { max-width:100%; display:block }

/* ═══ APP SHELL ══════════════════════════════════════════════ */
.app {
  display:grid;
  grid-template-columns:var(--rail-w) var(--sidebar-w) 1fr;
  grid-template-areas:"rail sidebar main";
  height:100vh;
  overflow:hidden;
}

/* ═══ ICON RAIL ══════════════════════════════════════════════ */
.icon-rail {
  grid-area:rail;
  background:var(--s100);
  border-right:1px solid var(--bd);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:16px 0;
  gap:2px;
  height:100vh;
  overflow:hidden;
  z-index:21;
  flex-shrink:0;
}
.icon-rail-item {
  width:44px; height:52px;
  border-radius:8px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:4px;
  cursor:pointer;
  transition:background var(--dMicro);
  position:relative;
  flex-shrink:0;
}
.icon-rail-item:hover:not(.icon-rail-item--soon) { background:var(--s200) }
.icon-rail-item.active { background:var(--bg); box-shadow:var(--shSm) }
.icon-rail-item--soon { opacity:.28; cursor:default }
.icon-rail-icon {
  width:20px; height:20px;
  stroke:var(--tx3); fill:none;
  stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round;
  display:block; flex-shrink:0;
}
.icon-rail-item.active .icon-rail-icon { stroke:var(--p) }
.icon-rail-label {
  font-size:9px; font-weight:600;
  color:var(--tx3); letter-spacing:-.01em;
  line-height:1;
  font-family:var(--font);
}
.icon-rail-item.active .icon-rail-label { color:var(--p); font-weight:700 }
.icon-rail-divider { width:20px; height:1px; background:var(--bd); margin:6px 0; flex-shrink:0 }
.icon-rail-spacer { flex:1 }

/* ═══ SIDEBAR ════════════════════════════════════════════════ */
.sidebar {
  grid-area:sidebar;
  background:var(--bg);
  border-right:1px solid var(--bd);
  display:flex;
  flex-direction:column;
  height:100vh;
  position:sticky;
  top:0;
  overflow-y:auto;
  overflow-x:hidden;
  z-index:20;
}

/* Sidebar scrollbar */
.sidebar::-webkit-scrollbar { width:4px }
.sidebar::-webkit-scrollbar-track { background:transparent }
.sidebar::-webkit-scrollbar-thumb { background:var(--s200); border-radius:2px }

/* Logo area */
.sidebar-logo {
  display:flex;
  align-items:center;
  gap:10px;
  padding:14px 14px 12px;
  border-bottom:1px solid var(--bd);
  flex-shrink:0;
}
.sidebar-logo-icon {
  width:32px; height:32px;
  background:var(--p);
  border-radius:9px;
  display:grid; place-items:center;
  flex-shrink:0;
}
.sidebar-logo-icon svg {
  width:17px; height:17px;
  stroke:#fff; fill:none;
  stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round;
}
.sidebar-logo-text { flex:1; min-width:0 }
.sidebar-brand {
  display:flex; align-items:center; gap:6px;
  font-size:14px; font-weight:800;
  letter-spacing:-.02em; color:var(--tx1);
  line-height:1.2;
}
.sidebar-brand-sub {
  font-size:10px; font-weight:500; color:var(--tx4);
  margin-top:1px;
}
.sidebar-brand-beta {
  font-size:9px; font-weight:700;
  background:var(--pt); color:var(--p);
  padding:1px 6px; border-radius:4px;
  letter-spacing:.02em;
}

/* Nav area */
.sidebar-nav { padding:10px 8px; flex:1 }

.sidebar-nav-item {
  display:flex;
  align-items:center;
  gap:6px;
  padding:6px 8px;
  border-radius:var(--rS);
  cursor:pointer;
  transition:background var(--dMicro), color var(--dMicro);
  color:var(--tx3);
  font-size:13px;
  font-weight:400;
  line-height:1.4;
}
.sidebar-nav-item:hover { background:var(--s100); color:var(--tx1) }
.sidebar-nav-item.active { background:var(--pt); color:var(--p); font-weight:600 }
.sidebar-nav-item--soon { cursor:default; opacity:.4 }
.sidebar-nav-item--soon:hover { background:transparent; color:var(--tx3) }

.sidebar-nav-icon { display:none }
.sidebar-nav-label { flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
.sidebar-nav-count {
  font-size:10px; font-weight:500;
  color:var(--tx4); background:var(--s100);
  padding:1px 6px; border-radius:var(--rPill); flex-shrink:0;
}
.sidebar-nav-item.active .sidebar-nav-count { background:rgba(49,130,246,.15); color:var(--p) }
.sidebar-nav-soon {
  font-size:9px; font-weight:700;
  color:var(--tx4); background:var(--s100);
  padding:1px 5px; border-radius:3px; letter-spacing:.04em;
}

/* Group label */
.sidebar-group { margin-top:8px }
.sidebar-group-label {
  font-size:11px; font-weight:600;
  color:var(--tx4); letter-spacing:.02em;
  padding:6px 8px 2px;
}

/* Sidebar divider */
.sidebar-divider { height:1px; background:var(--bd); margin:8px 4px }

/* Sidebar bottom */
.sidebar-bottom { padding:8px; border-top:1px solid var(--bd); flex-shrink:0 }
.sidebar-bottom-link {
  display:flex; align-items:center; gap:8px;
  padding:7px 8px; border-radius:var(--rS);
  font-size:12px; font-weight:500; color:var(--tx4);
  cursor:pointer; transition:background var(--dMicro), color var(--dMicro);
}
.sidebar-bottom-link:hover { background:var(--s100); color:var(--tx2) }
.sidebar-bottom-link svg { width:13px; height:13px; stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; flex-shrink:0 }

/* ═══ SIDEBAR SEARCH ═════════════════════════════════════════ */
.sidebar-search {
  padding:8px 8px 4px;
  flex-shrink:0;
}

/* Search bar */
.search-wrap {
  display:flex; align-items:center; gap:7px;
  background:var(--s100); border:1px solid var(--bd);
  border-radius:var(--rM);
  padding:6px 10px;
  width:100%;
  transition:border-color var(--dMicro), box-shadow var(--dMicro);
}
.search-wrap:focus-within { border-color:var(--p); box-shadow:0 0 0 3px rgba(49,130,246,.1); background:var(--bg) }
.search-icon { width:12px; height:12px; stroke:var(--tx4); fill:none; stroke-width:1.8; stroke-linecap:round; flex-shrink:0 }
.search-input {
  border:none; background:transparent;
  font-family:var(--font); font-size:12px; color:var(--tx1);
  width:100%; outline:none;
}
.search-input::placeholder { color:var(--tx4) }

/* Sidebar section meta */
.sidebar-meta {
  padding:4px 8px 2px;
  display:flex; align-items:center; justify-content:space-between;
  flex-shrink:0;
}
.sidebar-meta-title {
  font-size:11px; font-weight:600;
  color:var(--tx4); letter-spacing:.04em; text-transform:uppercase;
}
.sidebar-meta-count {
  font-size:10px; font-weight:600; color:var(--tx4);
  background:var(--s100); padding:1px 6px; border-radius:3px;
}

/* ═══ MAIN CONTENT ═══════════════════════════════════════════ */
.main {
  grid-area:main;
  overflow-y:auto;
  overflow-x:hidden;
  height:100vh;
  background:var(--bgc);
}

/* Main scrollbar */
.main::-webkit-scrollbar { width:6px }
.main::-webkit-scrollbar-track { background:transparent }
.main::-webkit-scrollbar-thumb { background:var(--s200); border-radius:3px }
.main::-webkit-scrollbar-thumb:hover { background:var(--s300) }

/* Content inner padding */
.main-inner {
  max-width:1060px;
  padding:40px 36px 80px;
}

/* Section header */
.section-hd {
  display:flex;
  flex-direction:column;
  gap:4px;
  margin-bottom:20px;
  padding-bottom:16px;
  border-bottom:1px solid var(--bd);
}
.section-eyebrow {
  font-size:11px;
  font-weight:700;
  color:var(--p);
  letter-spacing:.06em;
  text-transform:uppercase;
  display:flex;
  align-items:center;
  gap:6px;
}
.section-title {
  font-size:22px;
  font-weight:800;
  color:var(--tx1);
  letter-spacing:-.03em;
  line-height:1.2;
}
.section-desc {
  font-size:13px;
  color:var(--tx3);
  margin-top:2px;
}
.section-count-badge {
  display:none;
}
.section-meta-row {
  display:flex;
  align-items:center;
  gap:8px;
  margin-top:6px;
}
.section-count-chip {
  font-size:11px;
  font-weight:500;
  color:var(--tx4);
  background:var(--s100);
  padding:2px 8px;
  border-radius:var(--rPill);
}

/* Category heading inside a section */
.cat-hd {
  display:flex;
  align-items:center;
  gap:8px;
  margin:24px 0 12px;
}
.cat-hd-label {
  font-size:11px;
  font-weight:600;
  color:var(--tx4);
  letter-spacing:.06em;
  text-transform:uppercase;
}
.cat-hd-line { flex:1; height:1px; background:var(--bd) }
.cat-hd-count {
  font-size:10px;
  font-weight:600;
  color:var(--tx4);
  background:var(--s100);
  padding:1px 6px;
  border-radius:3px;
}

/* ═══ BLOCK CARD ══════════════════════════════════════════════ */
.block-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(260px,1fr));
  gap:16px;
}
.blk {
  border-radius:var(--rL);
  background:var(--bg);
  border:1px solid var(--bd);
  overflow:hidden;
  transition:border-color var(--dBase), box-shadow var(--dBase);
  cursor:pointer;
}
.blk:hover {
  border-color:var(--s300);
  box-shadow:var(--shPop);
}

/* Card preview body */
.blk-body {
  padding:24px 20px;
  min-height:180px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--s50);
  position:relative;
  overflow:hidden;
}
.blk-body--tall { min-height:220px }
.blk-body--nav { padding:0; background:var(--s50); min-height:0 }

/* Hover overlay — buttons appear on top of preview */
.blk-overlay {
  position:absolute; inset:0;
  background:rgba(15,23,42,.42);
  display:flex; align-items:center; justify-content:center; gap:8px;
  opacity:0;
  transition:opacity var(--dBase);
  backdrop-filter:blur(3px);
  -webkit-backdrop-filter:blur(3px);
}
.blk:hover .blk-overlay { opacity:1 }

/* Card footer — name only */
.blk-footer {
  padding:11px 14px 13px;
  border-top:1px solid var(--bd);
  background:var(--bg);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
}
.blk-name {
  font-size:13px;
  font-weight:600;
  color:var(--tx1);
  flex:1;
  min-width:0;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  letter-spacing:-.01em;
}
.blk-badge {
  font-size:10px;
  font-weight:500;
  color:var(--tx4);
  background:var(--s100);
  padding:2px 7px;
  border-radius:var(--rPill);
  flex-shrink:0;
}

/* Copy button (inside overlay) */
.copy-btn {
  display:flex;
  align-items:center;
  gap:5px;
  padding:8px 14px;
  background:#fff;
  color:var(--tx1);
  border-radius:var(--rPill);
  font-size:12px;
  font-weight:700;
  transition:background var(--dMicro), transform var(--dMicro);
  white-space:nowrap;
  flex-shrink:0;
  box-shadow:var(--shCard);
}
.copy-btn:hover { background:var(--p); color:#fff; transform:scale(1.03) }
.copy-btn svg {
  width:11px; height:11px;
  stroke:currentColor; fill:none;
  stroke-width:2.2; stroke-linecap:round; stroke-linejoin:round;
}

/* Preview icon button (secondary) */
.preview-btn {
  display:flex;
  align-items:center;
  justify-content:center;
  width:34px; height:34px;
  background:rgba(255,255,255,.18);
  border-radius:50%;
  font-size:15px;
  transition:background var(--dMicro);
  flex-shrink:0;
}
.preview-btn:hover { background:rgba(255,255,255,.32) }

/* ═══ BLOCK PREVIEW INTERNAL STYLES (inside card) ═══════════ */
/* — used by the mini-component previews — */
.nav-preview-wrap { padding:12px; width:100% }
.nav-duals { display:grid; grid-template-columns:3fr 1fr; gap:12px; align-items:start }
.preview-label { font-size:9px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--tx4); margin-bottom:6px; text-align:center }

.bf { border:1.5px solid var(--bd); border-radius:9px; overflow:hidden }
.bf-bar { background:var(--s100); padding:6px 9px; display:flex; align-items:center; gap:6px; border-bottom:1px solid var(--bd) }
.bf-dots { display:flex; gap:4px }
.bf-dot { width:7px; height:7px; border-radius:50% }
.bf-dot:nth-child(1){background:#ff5f57} .bf-dot:nth-child(2){background:#febc2e} .bf-dot:nth-child(3){background:#28c840}
.bf-url { flex:1; background:#fff; border-radius:3px; height:16px; padding:0 7px; font-size:8px; display:flex; align-items:center; color:var(--tx3); border:1px solid var(--bd) }
.bf-content { overflow:hidden; height:80px; position:relative; background:#fff }
.bf-scaled { transform:scale(0.48); transform-origin:top left; width:208.33%; pointer-events:none }

.pf-wrap { display:flex; flex-direction:column; align-items:center; gap:5px }
.pf { border:2.5px solid var(--s800); border-radius:20px; overflow:hidden; background:var(--s800); padding:4px 4px 7px; width:80px }
.pf-notch { width:28px; height:5px; background:var(--s700); border-radius:3px; margin:0 auto 3px }
.pf-screen { border-radius:14px; overflow:hidden; background:#fff; height:128px }
.pf-scaled { transform:scale(0.23); transform-origin:top left; width:435%; pointer-events:none }

/* Block preview component classes (embedded in card body) */
.pv-callout { background:var(--pt); border-radius:var(--rL); padding:13px 16px; display:flex; align-items:flex-start; gap:9px; border-left:3px solid var(--p); width:100% }
.pv-callout__icon { font-size:17px; flex-shrink:0; margin-top:1px }
.pv-callout__label { font-size:10px; font-weight:800; color:var(--p); letter-spacing:.08em; text-transform:uppercase; margin-bottom:3px }
.pv-callout__body { font-size:12px; color:var(--tx2); line-height:1.55 }

.pv-quote { padding:18px; border-radius:var(--rL); background:var(--bg); box-shadow:var(--shCard); position:relative; overflow:hidden; width:100% }
.pv-quote::before { content:'"'; position:absolute; top:-10px; left:12px; font-size:80px; color:var(--p); opacity:.07; font-family:Georgia,serif; line-height:1; pointer-events:none }
.pv-quote__text { font-size:12px; font-weight:600; color:var(--tx1); line-height:1.6; margin-bottom:8px; position:relative }
.pv-quote__author { font-size:10px; color:var(--tx3) }

.pv-warn { background:#fff8ed; border-radius:var(--rL); padding:13px 16px; display:flex; align-items:flex-start; gap:9px; border-left:3px solid var(--warn); width:100% }
.pv-warn__label { font-size:10px; font-weight:800; color:var(--warn); margin-bottom:3px; letter-spacing:.06em; text-transform:uppercase }
.pv-warn__body { font-size:12px; color:var(--tx2); line-height:1.55 }

.pv-stat-row { display:flex; gap:9px; width:100% }
.pv-stat { flex:1; background:var(--bg); border-radius:var(--rL); padding:12px 9px; box-shadow:var(--shCard); text-align:center }
.pv-stat__val { font-size:20px; font-weight:800; letter-spacing:-.04em; color:var(--tx1); line-height:1 }
.pv-stat__lbl { font-size:9px; color:var(--tx3); margin-top:3px }
.pv-stat__delta { font-size:10px; font-weight:700; color:var(--ok); margin-top:3px }

.pv-counter { background:var(--gradB); border-radius:var(--rXL); padding:20px 14px; display:flex; gap:8px; justify-content:space-around; width:100% }
.pv-counter__item { text-align:center; color:#fff }
.pv-counter__num { font-size:24px; font-weight:800; letter-spacing:-.04em; line-height:1; font-variant-numeric:tabular-nums }
.pv-counter__lbl { font-size:9px; opacity:.7; margin-top:3px }

.pv-hero { background:var(--bgc); border-radius:var(--rXL); padding:22px 18px; text-align:center; width:100% }
.pv-hero__badge { display:inline-flex; align-items:center; background:var(--pt); color:var(--p); font-size:9px; font-weight:800; padding:3px 9px; border-radius:var(--rPill); margin-bottom:9px; letter-spacing:.04em }
.pv-hero__h { font-size:16px; font-weight:800; color:var(--tx1); letter-spacing:-.03em; margin-bottom:5px; line-height:1.25 }
.pv-hero__p { font-size:11px; color:var(--tx3); line-height:1.6; margin-bottom:13px }
.pv-hero__btns { display:flex; gap:7px; justify-content:center; flex-wrap:wrap }

.pv-btn { display:inline-flex; align-items:center; justify-content:center; padding:0 11px; height:26px; border-radius:var(--rM); font-size:10px; font-weight:700; font-family:inherit; white-space:nowrap }
.pv-btn--p { background:var(--p); color:#fff }
.pv-btn--w { background:var(--pt); color:var(--p) }
.pv-btn--g { background:var(--s100); color:var(--tx1) }

.pv-price { border-radius:var(--rL); overflow:hidden; border:1px solid var(--bd); width:100% }
.pv-price table { width:100%; border-collapse:collapse; font-size:10px }
.pv-price th { background:var(--s50); padding:7px 10px; text-align:left; font-size:9px; font-weight:800; color:var(--tx3); letter-spacing:.06em; border-bottom:1px solid var(--bd) }
.pv-price td { padding:7px 10px; border-bottom:1px solid var(--bds); color:var(--tx2) }
.pv-price tr:last-child td { border-bottom:none }
.pv-price .ck { color:var(--ok); font-weight:800 }
.pv-price .xx { color:var(--err) }
.pv-price .badge-plan { display:inline-block; background:var(--pt); color:var(--p); font-size:9px; font-weight:700; padding:1px 6px; border-radius:var(--rPill) }

.pv-cta { background:var(--gradB); border-radius:var(--rXL); padding:20px 18px; display:flex; align-items:center; justify-content:space-between; gap:12px; width:100% }
.pv-cta__h { font-size:13px; font-weight:800; color:#fff; margin-bottom:3px; letter-spacing:-.01em }
.pv-cta__p { font-size:10px; color:rgba(255,255,255,.7) }

.pv-cta-card { background:var(--bgc); border-radius:var(--rXL); padding:24px; text-align:center; width:100%; border:1px solid var(--bd) }
.pv-cta-card__icon { font-size:26px; margin-bottom:9px }
.pv-cta-card__h { font-size:14px; font-weight:800; color:var(--tx1); margin-bottom:5px; letter-spacing:-.02em }
.pv-cta-card__p { font-size:11px; color:var(--tx3); margin-bottom:12px; line-height:1.5 }

.pv-badge { display:flex; flex-direction:column; align-items:center; gap:10px; width:100% }

/* ═══ TOAST ══════════════════════════════════════════════════ */
.toast {

  color:#fff;

.toast-icon svg { width:9px; height:9px; stroke:#fff; fill:none; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round }

/* ═══ KEYFRAMES ══════════════════════════════════════════════ */
@keyframes draw-circ { 0%{stroke-dashoffset:251} 60%,100%{stroke-dashoffset:0} }
@keyframes rot-circ { 0%{transform:rotate(-90deg)} 100%{transform:rotate(270deg)} }
@keyframes pop-chk { 0%,55%{opacity:0;transform:scale(.5)} 70%{opacity:1;transform:scale(1.15)} 80%,100%{opacity:1;transform:scale(1)} }
@keyframes float-y { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
@keyframes glow-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(0,100,255,0),var(--shCard)} 50%{box-shadow:0 0 28px 8px rgba(0,100,255,.12),var(--shPop)} }
@keyframes grad-flow { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
@keyframes ticker-scroll { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes slide-up { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

/* ── hero-ticker ── */
'hero-ticker':{name:'Hero — 티커 배너',fields:[
  {id:'items',label:'항목 (줄바꿈으로 구분)',type:'textarea',default:'런던 핀테크 탐방 리포트\nCTR 0.98→2.4% 달성\n릴스 1,080만 조회\n토스피드 스타일 디자인'},
],template:v=>{
  const items=v.items.split('\n').filter(Boolean);
  const doubled=[...items,...items];
  const ticker=doubled.map(t=>`<span style="display:inline-flex;align-items:center;gap:12px;flex-shrink:0;font-size:14px;font-weight:700;color:#fff;opacity:.9">${t}<span style="width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.4)"></span></span>`).join('');
  return`${FONT_LINK}
<style>*{box-sizing:border-box;margin:0;padding:0}:root{${CSS_VARS}}
@keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
</style>
<div style="${FULL_BLEED}background:var(--p);padding:10px 0;overflow:hidden;font-family:var(--font)">
  <div style="display:flex;gap:40px;white-space:nowrap;animation:tick ${items.length*4}s linear infinite">${ticker}</div>
</div>`;
}},

  {id:'q3',label:'Q3',type:'text',default:'어떤 종류의 앱을 출시할 수 있나요?'},{id:'a3',label:'A3',type:'text',default:'게임, 유틸리티, 콘텐츠, 쇼핑, 교육 등 다양한 카테고리의 미니앱을 출시할 수 있어요.'},
  {id:'q4',label:'Q4',type:'text',default:'사업자 등록이 꼭 필요한가요?'},{id:'a4',label:'A4',type:'text',default:'사업자 등록 없이도 출시는 가능해요. 다만 수익화 기능 사용 시에는 사업자 등록이 필요해요.'},
],template:v=>`${FONT_LINK}
<style>${NAV_CSS}*{box-sizing:border-box;margin:0;padding:0}:root{${CSS_VARS}}
.afq{font-family:var(--font);padding:56px 24px;background:var(--bg)}
.afq__h{text-align:center;font-size:clamp(22px,3.5vw,28px);font-weight:800;color:var(--tx1);letter-spacing:-.03em;margin-bottom:40px}
.afq__list{max-width:680px;margin:0 auto}
.afq__item{border-bottom:1px solid var(--bd)}
.afq__item:first-of-type{border-top:1px solid var(--bd)}
input.afq__tog{display:none}
.afq__label{display:flex;align-items:center;justify-content:space-between;padding:18px 4px;cursor:pointer;font-size:15px;font-weight:700;color:var(--tx1);gap:12px;letter-spacing:-.01em;user-select:none}
.afq__arrow{font-size:12px;color:var(--tx4);transition:transform .2s;flex-shrink:0}
input.afq__tog:checked~.afq__label .afq__arrow{transform:rotate(180deg)}
.afq__body{max-height:0;overflow:hidden;transition:max-height .3s ease}
input.afq__tog:checked~.afq__body{max-height:200px}

</style>
<div class="afq"><h2 class="afq__h">${v.headline}</h2><div class="afq__list"><div class="afq__item"><input type="checkbox" class="afq__tog" id="afq1"><label class="afq__label" for="afq1">Q. ${v.q1}<span class="afq__arrow">▼</span></label><div class="afq__body"><p class="afq__ans">${v.a1}</p></div></div><div class="afq__item"><input type="checkbox" class="afq__tog" id="afq2"><label class="afq__label" for="afq2">Q. ${v.q2}<span class="afq__arrow">▼</span></label><div class="afq__body"><p class="afq__ans">${v.a2}</p></div></div><div class="afq__item"><input type="checkbox" class="afq__tog" id="afq3"><label class="afq__label" for="afq3">Q. ${v.q3}<span class="afq__arrow">▼</span></label><div class="afq__body"><p class="afq__ans">${v.a3}</p></div></div><div class="afq__item"><input type="checkbox" class="afq__tog" id="afq4"><label class="afq__label" for="afq4">Q. ${v.q4}<span class="afq__arrow">▼</span></label><div class="afq__body"><p class="afq__ans">${v.a4}</p></div></div></div></div>`},

}; /* end BLOCK_DEFS */
</script>

<!-- ════ PART 3: RUNTIME JS (navigation, modal, copy) ════ -->
<script>
'use strict';

/* ── 현재 섹션 상태 ─────────────────────────────────────── */
let currentSection = 'all';
let currentBlockId = null;

/* ── 섹션 메타 ──────────────────────────────────────────── */
const SECTION_META = {
  'all':          { title:'전체 블록',    theme:'우피 블록' },
  'oopy-header':  { title:'헤더 블록',   theme:'우피 · 헤더' },
  'oopy-content': { title:'콘텐츠 블록', theme:'우피 · 콘텐츠' },
  'oopy-footer':  { title:'푸터 블록',   theme:'우피 · 푸터' },
  'tossfeed':     { title:'토스피드 스타일', theme:'토스피드' },
};

/* ── 초기화 ─────────────────────────────────────────────── */
function init() {
  renderCounts();
  navigate('all');
  bindKeyboard();
}

/* ── 카운트 뱃지 업데이트 ────────────────────────────────── */
function renderCounts() {
  let total = 0;
  BLOCK_SECTIONS.forEach(sec => {
    const n = sec.blocks.length;
    total += n;
    const el = document.getElementById('count-' + sec.id);
    if (el) el.textContent = n;
  });
  const allEl = document.getElementById('count-all');
  if (allEl) allEl.textContent = total;
  /* initial count for 'all' view */
  const countEl = document.getElementById('sidebar-section-count');
  if (countEl) countEl.textContent = total;
}

/* ── 네비게이션 ─────────────────────────────────────────── */
function navigate(sectionId) {
  currentSection = sectionId;

  /* sidebar active 상태 */
  document.querySelectorAll('.sidebar-nav-item[data-section]').forEach(el => {
    el.classList.toggle('active', el.dataset.section === sectionId);
  });

  /* sidebar meta 업데이트 */
  const meta = SECTION_META[sectionId] || { title: sectionId, theme: '' };
  const labelEl = document.getElementById('sidebar-section-label');
  if (labelEl) labelEl.textContent = meta.title;
  const countEl = document.getElementById('sidebar-section-count');
  if (countEl) {
    const cnt = sectionId === 'all'
      ? BLOCK_SECTIONS.reduce((s,sec)=>s+sec.blocks.length, 0)
      : (BLOCK_SECTIONS.find(s=>s.id===sectionId)||{blocks:[]}).blocks.length;
    countEl.textContent = cnt;
  }

  /* search 리셋 */
  document.getElementById('search-input').value = '';

  /* 콘텐츠 렌더 */
  renderContent(sectionId);

  /* 모바일: 사이드바 닫기 */
  closeSidebar();
}

/* ── 콘텐츠 렌더 ─────────────────────────────────────────── */
function renderContent(sectionId) {
  const container = document.getElementById('main-inner');
  container.innerHTML = '';

  /* 렌더할 섹션 결정 */
  const sectionsToRender = sectionId === 'all'
    ? BLOCK_SECTIONS
    : BLOCK_SECTIONS.filter(s => s.id === sectionId);

  if (sectionsToRender.length === 0 || sectionsToRender.every(s => s.blocks.length === 0)) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">📦</div>
        <div class="empty-state-title">블록이 없습니다</div>
        <div class="empty-state-desc">이 섹션에는 아직 블록이 추가되지 않았습니다.</div>
      </div>`;
    return;
  }

  sectionsToRender.forEach(sec => {
    if (sec.blocks.length === 0) return;

    /* section header */
    const hd = document.createElement('div');
    hd.className = 'section-hd';
    const secMeta = SECTION_META[sec.id] || { theme: sec.id };
    hd.innerHTML = `
      <div class="section-eyebrow">${secMeta.theme}</div>
      <div class="section-title">${sec.title}</div>
      ${sec.desc ? `<div class="section-desc">${sec.desc}</div>` : ''}
      <div class="section-meta-row">
        <span class="section-count-chip">${sec.blocks.length}개</span>
      </div>
    `;
    container.appendChild(hd);

    /* 카테고리 그룹 별로 */
    const groups = {};
    sec.blocks.forEach(b => {
      const g = b.group || '기타';
      if (!groups[g]) groups[g] = [];
      groups[g].push(b);
    });

    Object.entries(groups).forEach(([groupName, blocks]) => {
      /* category heading */
      if (Object.keys(groups).length > 1) {
        const catHd = document.createElement('div');
        catHd.className = 'cat-hd';
        catHd.innerHTML = `
          <span class="cat-hd-label">${groupName}</span>
          <div class="cat-hd-line"></div>
          <span class="cat-hd-count">${blocks.length}</span>
        `;
        container.appendChild(catHd);
      }

      /* block grid */
      const grid = document.createElement('div');
      grid.className = 'block-grid';
      blocks.forEach(b => {
        grid.appendChild(createCard(b));
      });
      container.appendChild(grid);
    });

    /* spacer between sections */
    const spacer = document.createElement('div');
    spacer.style.height = '24px';
    container.appendChild(spacer);
  });

  /* scroll to top */
  document.getElementById('main').scrollTo({ top: 0, behavior: 'smooth' });
}

/* ── 카드 생성 ──────────────────────────────────────────── */
function createCard(blockDef) {
  const card = document.createElement('div');
  card.className = 'blk';
  card.dataset.blockId = blockDef.id;
  card.dataset.name = (blockDef.name || '').toLowerCase();

  card.innerHTML = `
    <div class="blk-body${blockDef.bodyClass ? ' ' + blockDef.bodyClass : ''}">
      ${blockDef.preview || ''}
      <div class="blk-overlay">
        <button class="copy-btn" onclick="openModal('${blockDef.id}')">
          <svg viewBox="0 0 12 12"><rect x="4" y="4" width="7" height="7" rx="1.5"/><path d="M2 8H1.5A1.5 1.5 0 010 6.5v-5A1.5 1.5 0 011.5 0h5A1.5 1.5 0 018 1.5V2"/></svg>
          편집 후 복사
        </button>
      </div>
    </div>
    <div class="blk-footer">
      <div class="blk-name">${blockDef.name}</div>
      <span class="blk-badge">${blockDef.badge || ''}</span>
    </div>
  `;
  return card;
}

/* ── 검색 ────────────────────────────────────────────────── */
function handleSearch(query) {
  const q = query.toLowerCase().trim();
  const cards = document.querySelectorAll('.blk[data-block-id]');
  let visible = 0;

  cards.forEach(card => {
    const name = card.dataset.name || '';
    const match = !q || name.includes(q);
    card.dataset.hidden = match ? 'false' : 'true';
    if (match) visible++;
  });

  /* empty state */
  let emptyEl = document.getElementById('search-empty');
  if (!emptyEl) {
    emptyEl = document.createElement('div');
    emptyEl.id = 'search-empty';
    emptyEl.className = 'empty-state';
    emptyEl.innerHTML = `
      <div class="empty-state-icon">🔍</div>
      <div class="empty-state-title">검색 결과가 없습니다</div>
      <div class="empty-state-desc">"<strong id="search-query-disp"></strong>" 에 맞는 블록을 찾지 못했습니다.</div>
    `;
    document.getElementById('main-inner').appendChild(emptyEl);
  }
  emptyEl.style.display = (q && visible === 0) ? 'flex' : 'none';
  if (q) {
    const disp = document.getElementById('search-query-disp');
    if (disp) disp.textContent = query;
  }
}

/* ── 모달 열기 ───────────────────────────────────────────── */
function openModal(blockId) {
  const def = BLOCK_DEFS[blockId];
  if (!def) return;
  currentBlockId = blockId;

  document.getElementById('modal-title').textContent = def.name;
  const fieldsContainer = document.getElementById('modal-fields');
  fieldsContainer.innerHTML = '';

  (def.fields || []).forEach(f => {
    const fld = document.createElement('div');
    fld.className = 'fld';
    fld.innerHTML = `
      <label class="fld-lbl">${f.label}</label>
      ${f.type === 'textarea'
        ? `<textarea class="fld-inp" id="fld-${f.id}" rows="3">${f.default || ''}</textarea>`
        : `<input class="fld-inp" id="fld-${f.id}" type="text" value="${f.default || ''}">`
      }
      ${f.hint ? `<div class="fld-hint">${f.hint}</div>` : ''}
    `;
    fieldsContainer.appendChild(fld);
  });

  document.getElementById('modal-overlay').classList.add('open');
  /* focus first input */
  const first = fieldsContainer.querySelector('.fld-inp');
  if (first) setTimeout(() => first.focus(), 100);
}

/* ── 모달 닫기 ───────────────────────────────────────────── */
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  currentBlockId = null;
}
function overlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

/* ── 복사하기 ────────────────────────────────────────────── */
function copyBlock() {
  const def = BLOCK_DEFS[currentBlockId];
  if (!def) return;

  /* 필드값 수집 */
  const vals = {};
  (def.fields || []).forEach(f => {
    const el = document.getElementById('fld-' + f.id);
    vals[f.id] = el ? el.value : (f.default || '');
  });

  /* HTML 생성 */
  const html = def.template(vals);

  /* ```html 코드블록 형식으로 래핑 → 노션/우피 호환 */
  const codeBlock = '```html\n' + html + '\n```';

  navigator.clipboard.writeText(codeBlock).then(() => {
    closeModal();
    showToast();
  }).catch(() => {
    /* fallback */
    const ta = document.createElement('textarea');
    ta.value = codeBlock;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    closeModal();
    showToast();
  });
}

/* ── 토스트 ──────────────────────────────────────────────── */
function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

/* ── 키보드 단축키 ───────────────────────────────────────── */
function bindKeyboard() {
  document.addEventListener('keydown', e => {
    /* Esc: 모달 닫기 */
    if (e.key === 'Escape') closeModal();
    /* ⌘K / Ctrl+K: 검색 포커스 */
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault();
      document.getElementById('search-input').focus();
    }
  });
}

/* ── 모바일 사이드바 ─────────────────────────────────────── */
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sidebar-overlay');
  sb.classList.toggle('open');
  ov.classList.toggle('open');
}
function closeSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sidebar-overlay');
  sb.classList.remove('open');
  ov.classList.remove('open');
}

/* ── 앱 부트 ─────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
