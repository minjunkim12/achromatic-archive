<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Archive · Achromatic.</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
/* === Dark mode ========================================= */
:root { --nav-bg: rgba(255,255,255,.90); }
@media (prefers-color-scheme: dark) {
  :root {
    --ac-bg-page: #07101e; --ac-bg-canvas: #0c1525; --ac-bg-elev: #111f33;
    --ac-border: #1a2d47; --ac-border-soft: #111e32;
    --ac-fg-title: #e2e8f0; --ac-fg-body: #94a3b8;
    --ac-fg-meta: #3d5472; --ac-fg-mute: #263d5a;
    --ac-primary-tint: #08193e; --ac-primary-soft: #0d2255;
    --ac-slate-100: #111f33; --ac-shadow-card: 0 2px 12px rgba(0,0,0,.30);
    --ac-shadow-pop: 0 8px 28px rgba(0,0,0,.50); --nav-bg: rgba(7,16,30,.92);
  }
}

/* === Reset ============================================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; }
body { font-family: var(--ac-font-sans); background: var(--ac-bg-page); color: var(--ac-fg-body); min-height: 100dvh; display: flex; flex-direction: column; }
a { color: inherit; text-decoration: none; }
::selection { background: var(--ac-primary-tint); color: var(--ac-primary); }

/* === Nav =============================================== */
.nav {
  position: sticky; top: 0; z-index: 50;
  background: var(--nav-bg);
  backdrop-filter: saturate(180%) blur(16px);
  -webkit-backdrop-filter: saturate(180%) blur(16px);
  border-bottom: 1px solid var(--ac-border-soft);
}
.nav-inner {
  max-width: 1100px; margin: 0 auto; padding: 0 24px;
  height: 60px; display: flex; align-items: center; justify-content: space-between;
}
.brand { font-size: 17px; font-weight: 800; letter-spacing: -0.03em; color: var(--ac-fg-title); }
.brand .dot { color: var(--ac-primary); }
.nav-links { display: none; align-items: center; gap: 2px; }
@media (min-width: 768px) { .nav-links { display: flex; } }
.nav-link {
  font-size: 14px; font-weight: 600; color: var(--ac-fg-meta);
  padding: 7px 14px; border-radius: var(--ac-r-sm);
  transition: background var(--ac-d-micro), color var(--ac-d-micro);
}
.nav-link:hover, .nav-link.active { background: var(--ac-slate-100); color: var(--ac-fg-title); }
.nav-cta {
  margin-left: 6px; font-size: 14px; font-weight: 700; color: #fff;
  background: var(--ac-primary); padding: 9px 18px; border-radius: var(--ac-r-pill);
  transition: background var(--ac-d-micro);
}
.nav-cta:hover { background: var(--ac-primary-hover); }
.nav-right  { display: flex; align-items: center; gap: 4px; }
.nav-icons { display: flex; gap: 2px; }
.nav-icon {
  width: 38px; height: 38px; border-radius: var(--ac-r-sm);
  display: grid; place-items: center; color: var(--ac-fg-meta);
  transition: background var(--ac-d-micro), color var(--ac-d-micro);
}
.nav-icon:hover { background: var(--ac-slate-100); color: var(--ac-fg-title); }
.nav-hamburger { display: grid; }
@media (min-width: 768px) { .nav-hamburger { display: none; } }

/* === Page wrapper ====================================== */
.page-wrap { max-width: 1100px; margin: 0 auto; padding: 0 24px; flex: 1; }

/* === Archive header ==================================== */
.archive-header { padding: 48px 0 36px; border-bottom: 1px solid var(--ac-border-soft); }

.breadcrumb {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; font-weight: 600; color: var(--ac-fg-mute);
  margin-bottom: 16px;
}
.breadcrumb a { color: var(--ac-fg-meta); transition: color var(--ac-d-micro); }
.breadcrumb a:hover { color: var(--ac-primary); }
.breadcrumb .sep {
  display: grid; place-items: center; color: var(--ac-fg-mute);
}

.archive-title {
  font-size: clamp(28px, 4vw, 38px); font-weight: 800;
  letter-spacing: -0.03em; color: var(--ac-fg-title);
  margin-bottom: 8px;
}

.archive-count {
  font-size: 14px; font-weight: 500; color: var(--ac-fg-meta);
}

/* === Filter tabs ======================================= */
.filters {
  padding: 28px 0;
  border-bottom: 1px solid var(--ac-border-soft);
  overflow-x: auto;
  scrollbar-width: none;
}
.filters::-webkit-scrollbar { display: none; }
.filter-row {
  display: flex; align-items: center; gap: 8px;
  min-width: max-content;
}

.filter-tab {
  display: inline-flex; align-items: center;
  height: 32px; padding: 0 14px; border-radius: var(--ac-r-pill);
  font-size: 13px; font-weight: 600; cursor: pointer;
  border: 1.5px solid var(--ac-border);
  background: transparent; color: var(--ac-fg-meta);
  transition: background var(--ac-d-micro), color var(--ac-d-micro),
              border-color var(--ac-d-micro);
  white-space: nowrap;
}
.filter-tab:hover { border-color: var(--ac-slate-300); color: var(--ac-fg-title); }
.filter-tab.active {
  background: var(--ac-primary); border-color: var(--ac-primary);
  color: #fff;
}

/* === Article grid ====================================== */
.articles-section { padding: 40px 0 80px; }

.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
}
@media (min-width: 640px) {
  .grid { grid-template-columns: repeat(2, 1fr); }
}
@media (min-width: 960px) {
  .grid { grid-template-columns: repeat(3, 1fr); }
}

/* Article card */
.art-card {
  display: flex; flex-direction: column;
  border-radius: var(--ac-r-lg); overflow: hidden;
  border: 1px solid var(--ac-border);
  background: var(--ac-bg-elev);
  cursor: pointer;
  transition: border-color var(--ac-d-base), box-shadow var(--ac-d-base);
  opacity: 0;
  animation: fadeUp 300ms cubic-bezier(.2,0,0,1) forwards;
}
.art-card:hover { border-color: var(--ac-slate-300); box-shadow: var(--ac-shadow-pop); }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Card thumbnail */
.card-thumb {
  aspect-ratio: 16/9; overflow: hidden; flex-shrink: 0;
}
.card-thumb-fill {
  width: 100%; height: 100%;
  transition: transform 440ms cubic-bezier(.2,0,0,1);
}
.art-card:hover .card-thumb-fill { transform: scale(1.06); }

/* Card body */
.card-body { padding: 18px 20px 20px; flex: 1; display: flex; flex-direction: column; gap: 6px; }

.card-tag {
  display: inline-flex; align-items: center; align-self: flex-start;
  height: 20px; padding: 0 8px; border-radius: var(--ac-r-pill);
  font-size: 10px; font-weight: 700; letter-spacing: .025em;
  background: var(--ac-primary-tint); color: var(--ac-primary);
}
.card-tag.slate { background: var(--ac-slate-100); color: var(--ac-fg-meta); }
.card-tag.green { background: #e4f7ef; color: #0f7d53; }
.card-tag.amber { background: #fff3e0; color: #b56e00; }
@media (prefers-color-scheme: dark) {
  .card-tag.green { background: #09281c; color: var(--ac-success); }
  .card-tag.amber { background: #281c00; color: var(--ac-warning); }
}

.card-title {
  font-size: 16px; font-weight: 700; letter-spacing: -0.02em;
  line-height: 1.4; color: var(--ac-fg-title); text-wrap: balance;
  margin-top: 2px;
  transition: color var(--ac-d-micro);
}
.art-card:hover .card-title { color: var(--ac-primary); }

.card-excerpt {
  font-size: 13px; line-height: 1.65; color: var(--ac-fg-meta);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  flex: 1;
}

.card-meta-row {
  display: flex; align-items: center; gap: 6px;
  margin-top: 12px;
  font-size: 12px; font-weight: 500; color: var(--ac-fg-mute);
  font-variant-numeric: tabular-nums;
}
.card-dot { color: var(--ac-border); }

/* Empty state */
.empty {
  display: none; flex-direction: column; align-items: center;
  text-align: center; padding: 72px 0; gap: 10px; grid-column: 1/-1;
}
.empty.show { display: flex; }
.empty-icon {
  width: 52px; height: 52px; border-radius: var(--ac-r-md);
  background: var(--ac-bg-canvas); border: 1px solid var(--ac-border);
  display: grid; place-items: center; margin-bottom: 8px; color: var(--ac-fg-mute);
}
.empty-title { font-size: 16px; font-weight: 700; color: var(--ac-fg-title); }
.empty-desc  { font-size: 14px; color: var(--ac-fg-meta); }

/* === Pagination ======================================== */
.pagination {
  display: flex; align-items: center; justify-content: center;
  gap: 4px; padding: 0 0 80px;
}
.page-btn {
  display: grid; place-items: center;
  width: 36px; height: 36px; border-radius: var(--ac-r-sm);
  font-size: 14px; font-weight: 600; cursor: pointer;
  border: 1px solid var(--ac-border); background: transparent;
  color: var(--ac-fg-meta);
  transition: background var(--ac-d-micro), color var(--ac-d-micro), border-color var(--ac-d-micro);
}
.page-btn:hover { background: var(--ac-slate-100); color: var(--ac-fg-title); border-color: var(--ac-slate-300); }
.page-btn.active { background: var(--ac-primary); border-color: var(--ac-primary); color: #fff; }
.page-btn.arrow { color: var(--ac-fg-mute); }

/* === Footer ============================================ */
.page-footer { border-top: 1px solid var(--ac-border-soft); margin-top: auto; }
.footer-inner {
  max-width: 1100px; margin: 0 auto; padding: 28px 24px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
}
.footer-brand { font-size: 14px; font-weight: 800; letter-spacing: -0.025em; color: var(--ac-fg-title); }
.footer-brand .dot { color: var(--ac-primary); }
.footer-copy { font-size: 12px; color: var(--ac-fg-mute); letter-spacing: .02em; }
</style>
</head>
<body>

<!-- Nav -->
<nav class="nav">
  <div class="nav-inner">
    <a class="brand" href="index.html">Achromatic<span class="dot">.</span></a>
    <div class="nav-right">
      <div class="nav-links">
      <a class="nav-link active" href="archive.html">Archive</a>
      <a class="nav-link" href="about.html">About</a>
      <a class="nav-cta" href="#">구독하기</a>
    </div>
    <div class="nav-icons">
      <a class="nav-icon" href="#" aria-label="검색">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </a>
      <a class="nav-icon nav-hamburger" href="#" aria-label="메뉴">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </a>
    </div>
    </div>
  </div>
</nav>

<div class="page-wrap">

  <!-- Archive header -->
  <div class="archive-header">
    <div class="breadcrumb">
      <a href="index.html">전체</a>
      <span class="sep">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </span>
      <span id="crumb-current">전체 글</span>
    </div>
    <h1 class="archive-title" id="archive-title">전체 아티클</h1>
    <div class="archive-count" id="archive-count"></div>
  </div>

  <!-- Filter tabs -->
  <div class="filters">
    <div class="filter-row" id="filter-row">
      <!-- Injected by JS -->
    </div>
  </div>

  <!-- Article grid -->
  <section class="articles-section">
    <div class="grid" id="grid">
      <!-- Injected by JS -->
    </div>
  </section>

  <!-- Pagination -->
  <div class="pagination">
    <button class="page-btn arrow" aria-label="이전">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="page-btn active">1</button>
    <button class="page-btn">2</button>
    <button class="page-btn">3</button>
    <button class="page-btn arrow" aria-label="다음">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>

</div>

<!-- Footer -->
<footer class="page-footer">
  <div class="footer-inner">
    <span class="footer-brand">Achromatic<span class="dot">.</span></span>
    <span class="footer-copy">© 2026 · All content, no ads.</span>
  </div>
</footer>

<script>
/* Static posts data (mirrors posts.json) */
var POSTS = [
  { id:'06', tag:'Tech',       tagCls:'slate', author:'이의철',   date:'2026-05-14', title:'AI 시대, 성과 내는 조직일수록 토스식 TPM이 필요한 이유', description:'기술 변화는 빠르고 팀 간 의존성은 복잡해져요. 회색지대를 누가 어떻게 풀어야 하는지 정리했어요.', href:'Article Detail.html', bgColor:'#0064FF' },
  { id:'05', tag:'디자인 노트', tagCls:'blue',  author:'Achromatic', date:'2026-04-28', title:'흰 배경의 비밀', description:'토스가 모든 화면을 비우는 이유. 정보 위계를 바라보는 디자이너의 시선에서 정리했어요.', href:'#', bgColor:'#1e293b' },
  { id:'04', tag:'에세이',     tagCls:'green', author:'Achromatic', date:'2026-04-12', title:'한 화면, 한 결정', description:'의사결정 부하를 낮추는 가장 쉬운 방법. 토스의 1화면 1결정 원칙을 들여다봤어요.', href:'#', bgColor:'#334155' },
  { id:'03', tag:'툴 노트',    tagCls:'amber', author:'Achromatic', date:'2026-03-30', title:'8px 그리드의 작은 진실', description:'왜 디자이너들은 8px 단위를 고집할까요. 픽셀 단위가 아닌 시스템으로 생각하는 법을 정리했어요.', href:'#', bgColor:'#0052D4' },
  { id:'02', tag:'디자인 노트', tagCls:'blue',  author:'Achromatic', date:'2026-03-15', title:'정렬은 왜 신뢰를 만드는가', description:'눈에 보이지 않는 그리드가 페이지의 신뢰도를 결정해요. 정렬이 심리에 미치는 영향을 살펴봤어요.', href:'#', bgColor:'#475569' },
  { id:'01', tag:'에세이',     tagCls:'green', author:'Achromatic', date:'2026-02-28', title:'좋은 글은 결론부터 말해요', description:'토스 라이팅 원칙의 첫 번째 규칙. 왜 첫 문장이 결론이어야 하는지, 그리고 어떻게 훈련하는지.', href:'#', bgColor:'#0f172a' }
];

var CATS = ['전체', 'Tech', '디자인 노트', '에세이', '툴 노트'];
var currentCat = '전체';

function fmtDate(s) {
  var p = s.split('-'); return p[0] + '.' + p[1] + '.' + p[2];
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderFilters() {
  var row = document.getElementById('filter-row');
  row.innerHTML = CATS.map(function(cat) {
    return '<button class="filter-tab' + (cat === currentCat ? ' active' : '') +
           '" data-cat="' + esc(cat) + '">' + esc(cat) + '</button>';
  }).join('');

  row.querySelectorAll('.filter-tab').forEach(function(btn) {
    btn.addEventListener('click', function() {
      currentCat = btn.dataset.cat;
      renderFilters();
      renderGrid();
      updateHeader();
    });
  });
}

function renderGrid() {
  var grid   = document.getElementById('grid');
  var posts  = currentCat === '전체' ? POSTS : POSTS.filter(function(p) { return p.tag === currentCat; });

  if (posts.length === 0) {
    grid.innerHTML = '<div class="empty show"><div class="empty-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div><div class="empty-title">이 카테고리에 글이 없어요</div><div class="empty-desc">다른 카테고리를 선택해봐요.</div></div>';
    return;
  }

  grid.innerHTML = posts.map(function(p, i) {
    return [
      '<a class="art-card" href="' + esc(p.href) + '" style="animation-delay:' + (i*50) + 'ms">',
        '<div class="card-thumb">',
          '<div class="card-thumb-fill" style="background:' + esc(p.bgColor) + '"></div>',
        '</div>',
        '<div class="card-body">',
          '<span class="card-tag ' + esc(p.tagCls) + '">' + esc(p.tag) + '</span>',
          '<div class="card-title">' + esc(p.title) + '</div>',
          '<div class="card-excerpt">' + esc(p.description) + '</div>',
          '<div class="card-meta-row">',
            '<span>' + esc(p.author) + '</span>',
            '<span class="card-dot">·</span>',
            '<span>' + fmtDate(p.date) + '</span>',
          '</div>',
        '</div>',
      '</a>'
    ].join('');
  }).join('');
}

function updateHeader() {
  var posts  = currentCat === '전체' ? POSTS : POSTS.filter(function(p) { return p.tag === currentCat; });
  document.getElementById('archive-title').textContent  = currentCat === '전체' ? '전체 아티클' : currentCat;
  document.getElementById('archive-count').textContent  = '총 ' + posts.length + '편';
  document.getElementById('crumb-current').textContent  = currentCat === '전체' ? '전체 글' : currentCat;
}

renderFilters();
renderGrid();
updateHeader();

/* Pagination click (visual only) */
document.querySelectorAll('.page-btn:not(.arrow)').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.page-btn:not(.arrow)').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
  });
});
</script>

<script defer src="/_vercel/insights/script.js"></script>
</body>
